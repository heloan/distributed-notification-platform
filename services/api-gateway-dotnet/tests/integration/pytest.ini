[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: Quick smoke tests
    health: Health endpoint tests
    validation: Input validation tests
    forwarding: Event forwarding tests
    observability: Metrics and Swagger tests
    selenium: Browser-based Selenium tests
addopts =
    -v
    --tb=short
    --strict-markers
    --html=reports/pytest-report.html
    --self-contained-html
