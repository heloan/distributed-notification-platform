# =============================================================================
# Docker Compose — Test Environment
# Spins up infrastructure + services for running black-box tests.
# Usage: docker compose -f docker-compose.test.yml up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres-test:
    image: postgres:16-alpine
    container_name: dsnp-postgres-test
    environment:
      POSTGRES_DB: dsnp_test
      POSTGRES_USER: dsnp
      POSTGRES_PASSWORD: dsnp_test_pass
    ports:
      - "5433:5432"
    volumes:
      - ../infrastructure/init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dsnp"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper-test:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: dsnp-zookeeper-test
    environment:
      ZOOKEEPER_CLIENT_PORT: 2182
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2182:2182"

  kafka-test:
    image: confluentinc/cp-kafka:7.6.0
    container_name: dsnp-kafka-test
    depends_on:
      - zookeeper-test
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-test:2182
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-test:29093,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9093 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

