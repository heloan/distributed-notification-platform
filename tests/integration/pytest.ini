[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: Quick smoke tests
    health: Health endpoint tests
    validation: Input validation tests
    forwarding: Event forwarding tests
    observability: Metrics and Swagger tests
    gateway: API Gateway tests
    event_service: Event Service tests
    notification_service: Notification Service tests
    e2e: End-to-end flow tests
addopts =
    -v
    --tb=short
    --strict-markers
    --html=reports/pytest-report.html
    --self-contained-html
